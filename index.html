<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PONNE 母の日ギフト診断</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: linear-gradient(160deg, #fff8f8 0%, #fdf4ee 50%, #f8f4ff 100%); min-height: 100vh; }
    @keyframes fadeUp { from { opacity:0; transform:translateY(18px);} to { opacity:1; transform:translateY(0);} }
    @keyframes popIn { from { opacity:0; transform:scale(0.92);} to { opacity:1; transform:scale(1);} }
    .fade-up { animation: fadeUp 0.5s ease forwards; }
    .pop-in { animation: popIn 0.4s ease forwards; }
    .opt { transition: all 0.22s ease; cursor: pointer; border: none; width: 100%; text-align: left; }
    .opt:hover { transform: translateY(-4px) scale(1.02); }
    .gift-card { transition: all 0.28s ease; cursor: pointer; }
    .gift-card:hover { transform: translateY(-4px); }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
const { useState } = React;

const questions = [
  { id: "budget", label: "ご予算はどのくらいですか？", sub: "お気持ちに合わせてお選びください",
    options: [
      { value: "low", label: "〜3,000円", emoji: "🌷", desc: "気軽にプレゼント" },
      { value: "mid", label: "〜5,000円", emoji: "💐", desc: "ちょっと特別に" },
      { value: "high", label: "〜9,000円", emoji: "🌹", desc: "とびきり特別に" },
    ]},
  { id: "style", label: "お母さんのスタイルは？", sub: "普段のファッションに近いものをお選びください",
    options: [
      { value: "elegant", label: "上品・きれいめ", emoji: "👒", desc: "シンプルで洗練されたスタイル" },
      { value: "casual", label: "ナチュラル・カジュアル", emoji: "🌿", desc: "ナチュラルで気取らないスタイル" },
      { value: "cute", label: "かわいい・フェミニン", emoji: "🎀", desc: "花柄やピンクが好きなスタイル" },
    ]},
  { id: "use", label: "どんなシーンで使ってほしい？", sub: "プレゼントの用途をお選びください",
    options: [
      { value: "accessory", label: "毎日のおしゃれに", emoji: "✨", desc: "日常のコーデのアクセントに" },
      { value: "display", label: "お部屋に飾って", emoji: "🏡", desc: "インテリアとして眺めて楽しむ" },
      { value: "both", label: "どちらでも", emoji: "🎁", desc: "使うもよし、飾るもよし" },
    ]},
  { id: "message", label: "どんな想いを伝えたい？", sub: "ギフトに込めたいメッセージをお選びください",
    options: [
      { value: "luxury", label: "豪華に祝いたい", emoji: "🥂", desc: "いつも頑張るお母さんへ特別なものを" },
      { value: "flower", label: "花と一緒に贈りたい", emoji: "🌸", desc: "お花の温かみも添えて" },
      { value: "personal", label: "特別感を出したい", emoji: "💌", desc: "世界にひとつのパーソナルなギフト" },
    ]},
];

const gifts = [
  { id:1, emoji:"💍", fullName:"ピアス・ネックレス・リング\n3点セット", price:"¥8,600", tag:"LUXE SET", tagColor:"#c8a030", color:"#7ee8e0", url:"https://www.creema.jp/item/20678610/detail", desc:"リング・ピアス・ネックレスが揃う贅沢なセット。PONNEの世界観を丸ごとお届け。統一感あるスタイリングで、毎日のコーデをランクアップ。", points:["3点セットでお得","毎日のおしゃれに","ギフトBOX付き"], score:{ budget:{high:3,mid:1}, style:{elegant:3,casual:1,cute:2}, use:{accessory:3,both:2}, message:{luxury:3,personal:1} } },
  { id:2, emoji:"💐", fullName:"フラワーボックス＋\nネックレス 2点セット", price:"¥5,000", tag:"FLOWER", tagColor:"#9b7bb8", color:"#9b7bb8", url:"https://www.creema.jp/item/20649967/detail", desc:"紫陽花のプリザーブドフラワーとネックレスのセット。ふわりと広がる花の美しさと、上品なアクセサリーが母の日にぴったりの一箱。", points:["花とアクセのセット","母の日専用ラッピング","特別感たっぷり"], score:{ budget:{mid:3,high:1}, style:{cute:3,elegant:2,casual:2}, use:{both:3,display:2,accessory:1}, message:{flower:3,luxury:1,personal:1} } },
  { id:3, emoji:"🏡", fullName:"イニシャル入り\n小物入れ", price:"¥3,000", tag:"PERSONAL", tagColor:"#c8a030", color:"#f5ede0", url:"https://www.creema.jp/item/19122057/detail", desc:"樹脂で作られたお花入りの小物入れ。イニシャルを入れて世界にひとつのオリジナルに。リングやピアスの収納にも◎", points:["名前・イニシャル入り","お部屋に飾れる","リーズナブル"], score:{ budget:{low:3,mid:1}, style:{elegant:2,casual:3,cute:2}, use:{display:3,both:2}, message:{personal:3,flower:1} } },
  { id:4, emoji:"💛", fullName:"選べる2点\nリングセット", price:"¥4,950", tag:"SELECT", tagColor:"#c8a030", color:"#f4c4a0", url:"https://www.creema.jp/item/20047911/detail", desc:"カラーを自由に選べるリング2点セット。お母さんの好みに合わせてカスタマイズ。重ね付けも楽しめる。", points:["カラー自由に選べる","重ね付けも楽しい","日常使いに最適"], score:{ budget:{mid:3,low:1}, style:{casual:3,cute:3,elegant:1}, use:{accessory:3,both:2}, message:{personal:2,luxury:1,flower:1} } },
];

function calcScores(answers) {
  return gifts.map(g => {
    let score = 0;
    for (const [qid, val] of Object.entries(answers)) score += g.score[qid]?.[val] ?? 0;
    return { ...g, totalScore: score };
  }).sort((a,b) => b.totalScore - a.totalScore);
}

function App() {
  const [step, setStep] = useState(0);
  const [answers, setAnswers] = useState({});
  const [phase, setPhase] = useState("intro");
  const [expandedGift, setExpandedGift] = useState(null);
  const [hovered, setHovered] = useState(null);
  const ranked = phase === "result" ? calcScores(answers) : [];

  function handleAnswer(val) {
    const newAnswers = { ...answers, [questions[step].id]: val };
    setAnswers(newAnswers);
    if (step < questions.length - 1) { setStep(step + 1); }
    else { setPhase("result"); }
  }

  function handleReset() { setPhase("intro"); setStep(0); setAnswers({}); setExpandedGift(null); }

  return (
    <div style={{ fontFamily:"'Hiragino Mincho ProN','Yu Mincho',Georgia,serif", display:"flex", flexDirection:"column", alignItems:"center", padding:"32px 16px 48px", minHeight:"100vh" }}>
      <div className="fade-up" style={{ textAlign:"center", marginBottom:"36px" }}>
        <div style={{ fontSize:"11px", letterSpacing:"7px", color:"#c8a030", fontFamily:"sans-serif", marginBottom:"6px" }}>MOTHER'S DAY</div>
        <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"38px", fontWeight:"300", letterSpacing:"8px", color:"#2a1818" }}>PONNE</div>
        <div style={{ width:"48px", height:"1px", background:"linear-gradient(90deg,transparent,#c8a030,transparent)", margin:"10px auto" }}/>
        <div style={{ fontSize:"12px", color:"#9a7060", fontFamily:"sans-serif", letterSpacing:"2px" }}>樹脂と花と色と</div>
      </div>

      {phase === "intro" && (
        <div className="fade-up" style={{ width:"100%", maxWidth:"420px" }}>
          <div style={{ background:"#fff", borderRadius:"24px", padding:"40px 28px", boxShadow:"0 8px 40px rgba(200,140,60,0.1)", border:"1px solid rgba(200,160,80,0.15)" }}>
            <div style={{ textAlign:"center" }}>
              <div style={{ fontSize:"40px", marginBottom:"16px" }}>🌸</div>
              <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"22px", fontWeight:"400", color:"#2a1818", margin:"0 0 12px", lineHeight:"1.5" }}>あなたにぴったりの<br/>母の日ギフトを見つけよう</h2>
              <p style={{ fontSize:"13px", color:"#9a7060", fontFamily:"sans-serif", lineHeight:"1.8", margin:"0 0 28px" }}>4つの質問に答えるだけで、<br/>お母さんへの最高のギフトをご提案します。</p>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"8px", marginBottom:"28px" }}>
              {gifts.map(g => (
                <div key={g.id} style={{ display:"flex", alignItems:"center", gap:"12px", padding:"10px 16px", background:"#faf8f5", borderRadius:"12px", border:"1px solid #f0e8d8" }}>
                  <span style={{ fontSize:"22px" }}>{g.emoji}</span>
                  <span style={{ flex:1, fontSize:"13px", color:"#4a3028", fontFamily:"sans-serif" }}>{g.fullName.replace('\n','　')}</span>
                  <span style={{ fontSize:"14px", fontWeight:"600", color:"#c8a030", fontFamily:"sans-serif" }}>{g.price}</span>
                </div>
              ))}
            </div>
            <button onClick={() => setPhase("quiz")} style={{ width:"100%", padding:"16px", background:"linear-gradient(135deg,#d4a820,#c07858)", border:"none", borderRadius:"14px", color:"#fff", fontSize:"14px", fontFamily:"sans-serif", letterSpacing:"4px", cursor:"pointer", boxShadow:"0 6px 20px rgba(200,120,60,0.3)" }}>
              診断スタート 🌸
            </button>
          </div>
        </div>
      )}

      {phase === "quiz" && (
        <div className="fade-up" style={{ width:"100%", maxWidth:"420px" }}>
          <div style={{ display:"flex", gap:"6px", marginBottom:"28px" }}>
            {questions.map((_,i) => <div key={i} style={{ flex:1, height:"3px", borderRadius:"2px", background: i<=step ? "linear-gradient(90deg,#d4a820,#c07858)" : "#f0e0d0", transition:"background 0.4s" }} />)}
          </div>
          <div style={{ background:"#fff", borderRadius:"24px", padding:"32px 28px", boxShadow:"0 8px 40px rgba(200,140,60,0.1)", border:"1px solid rgba(200,160,80,0.12)" }}>
            <div style={{ fontSize:"11px", letterSpacing:"4px", color:"#c8a030", fontFamily:"sans-serif", marginBottom:"8px" }}>Q{step+1} / {questions.length}</div>
            <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"22px", fontWeight:"400", color:"#2a1818", margin:"0 0 6px", lineHeight:"1.4" }}>{questions[step].label}</h2>
            <p style={{ fontSize:"12px", color:"#9a7060", fontFamily:"sans-serif", margin:"0 0 24px" }}>{questions[step].sub}</p>
            <div style={{ display:"flex", flexDirection:"column", gap:"10px" }}>
              {questions[step].options.map(opt => (
                <button key={opt.value} className="opt" onClick={() => handleAnswer(opt.value)}
                  onMouseEnter={() => setHovered(opt.value)} onMouseLeave={() => setHovered(null)}
                  style={{ padding:"16px 20px", background: hovered===opt.value ? "linear-gradient(135deg,#fff8f0,#fff0f8)" : "#faf8f5", border: hovered===opt.value ? "2px solid #c8a030" : "2px solid #f0e8d8", borderRadius:"14px", display:"flex", alignItems:"center", gap:"14px", boxShadow: hovered===opt.value ? "0 6px 20px rgba(200,140,60,0.15)" : "none" }}>
                  <span style={{ fontSize:"24px" }}>{opt.emoji}</span>
                  <div>
                    <div style={{ fontSize:"15px", color:"#2a1818", fontFamily:"sans-serif", fontWeight:"600", marginBottom:"2px" }}>{opt.label}</div>
                    <div style={{ fontSize:"12px", color:"#9a7060", fontFamily:"sans-serif" }}>{opt.desc}</div>
                  </div>
                </button>
              ))}
            </div>
          </div>
          {step > 0 && <button onClick={() => setStep(step-1)} style={{ width:"100%", padding:"12px", background:"transparent", border:"none", color:"#9a7060", fontSize:"13px", fontFamily:"sans-serif", cursor:"pointer", marginTop:"12px" }}>← もどる</button>}
        </div>
      )}

      {phase === "result" && (
        <div style={{ width:"100%", maxWidth:"460px" }}>
          <div className="fade-up" style={{ textAlign:"center", marginBottom:"28px" }}>
            <div style={{ fontSize:"28px", marginBottom:"8px" }}>🌸</div>
            <div style={{ fontSize:"11px", letterSpacing:"5px", color:"#c8a030", fontFamily:"sans-serif", marginBottom:"6px" }}>YOUR PERFECT GIFT</div>
            <h2 style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"24px", fontWeight:"400", color:"#2a1818", margin:"0 0 6px" }}>あなたへのおすすめギフト</h2>
            <p style={{ fontSize:"12px", color:"#9a7060", fontFamily:"sans-serif" }}>スコアの高い順に表示しています</p>
          </div>
          <div style={{ display:"flex", flexDirection:"column", gap:"14px" }}>
            {ranked.map((gift, idx) => {
              const isTop = idx === 0;
              const isExpanded = expandedGift === gift.id;
              return (
                <div key={gift.id} className="gift-card pop-in"
                  style={{ animationDelay:`${idx*0.1}s`, opacity:0, background:"#fff", borderRadius:"20px", border: isTop ? "2px solid #c8a030" : "2px solid transparent", boxShadow: isTop ? "0 8px 32px rgba(200,140,60,0.18)" : "0 4px 16px rgba(0,0,0,0.06)", overflow:"hidden", position:"relative" }}
                  onClick={() => setExpandedGift(isExpanded ? null : gift.id)}>
                  {isTop && <div style={{ position:"absolute", top:"12px", right:"12px", background:"linear-gradient(135deg,#d4a820,#c07858)", color:"#fff", fontSize:"10px", fontFamily:"sans-serif", padding:"3px 10px", borderRadius:"20px", letterSpacing:"2px" }}>BEST MATCH ✨</div>}
                  <div style={{ display:"flex", alignItems:"center", padding:"20px", gap:"16px" }}>
                    <div style={{ width:"56px", height:"56px", background:`${gift.color}40`, borderRadius:"16px", display:"flex", alignItems:"center", justifyContent:"center", fontSize:"28px", flexShrink:0 }}>{gift.emoji}</div>
                    <div style={{ flex:1 }}>
                      <div style={{ display:"inline-block", background:`${gift.tagColor}18`, color:gift.tagColor, fontSize:"9px", fontFamily:"sans-serif", padding:"2px 8px", borderRadius:"20px", letterSpacing:"2px", marginBottom:"5px" }}>{gift.tag}</div>
                      <div style={{ fontFamily:"'Cormorant Garamond',serif", fontSize:"17px", color:"#2a1818", whiteSpace:"pre-line", lineHeight:"1.3", marginBottom:"4px" }}>{gift.fullName}</div>
                      <div style={{ fontSize:"16px", color:"#c8a030", fontFamily:"sans-serif", fontWeight:"700" }}>{gift.price}</div>
                    </div>
                    <div style={{ fontSize:"14px", color:"#c8a030", transition:"transform 0.3s", transform: isExpanded ? "rotate(180deg)" : "rotate(0)", flexShrink:0 }}>▼</div>
                  </div>
                  {isExpanded && (
                    <div style={{ padding:"0 20px 20px", borderTop:"1px solid #f5ede0", paddingTop:"16px" }}>
                      <div style={{ display:"flex", gap:"6px", marginBottom:"12px", flexWrap:"wrap" }}>
                        {gift.points.map(p => <span key={p} style={{ fontSize:"11px", padding:"3px 10px", background:"#f5ede0", borderRadius:"20px", color:"#9a7040", fontFamily:"sans-serif" }}>✔ {p}</span>)}
                      </div>
                      <p style={{ fontSize:"13px", color:"#6a4838", fontFamily:"sans-serif", lineHeight:"1.9", margin:"0 0 16px" }}>{gift.desc}</p>
                      <a href={gift.url} target="_blank" rel="noopener noreferrer" onClick={e => e.stopPropagation()}
                        style={{ display:"block", width:"100%", padding:"13px", background:"linear-gradient(135deg,#d4a820,#c07858)", borderRadius:"10px", color:"#fff", fontSize:"13px", fontFamily:"sans-serif", letterSpacing:"3px", cursor:"pointer", textDecoration:"none", textAlign:"center", boxShadow:"0 4px 14px rgba(200,120,60,0.3)" }}>
                        このギフトを選ぶ 🌸
                      </a>
                    </div>
                  )}
                </div>
              );
            })}
          </div>
          <button onClick={handleReset} style={{ width:"100%", padding:"14px", background:"transparent", border:"1px solid #e0d0c0", borderRadius:"14px", color:"#9a7060", fontSize:"13px", fontFamily:"sans-serif", cursor:"pointer", marginTop:"20px", letterSpacing:"2px" }}>
            ← もう一度診断する
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
